scenarios:
  # Long docs loaded in order. Question targets the FIRST document —
  # earliest KV blocks, highest eviction risk.
  - id: early_doc_recall
    description: "Recall content from the first document loaded (earliest KV blocks, highest eviction risk)"
    document_ids:
      - doc_history_of_the_internet
      - doc_world_war_ii
      - doc_climate_change
      - doc_ancient_rome
      - doc_black_death
    question: "Summarize Document 1 only — do not mention any other documents. What is it about and what are exactly two specific facts from it?"
    target_doc_id: doc_history_of_the_internet
    key_facts:
      - Internet
      - ARPANET
      - Tim Berners-Lee

  # Question targets a document from the middle of the context window.
  - id: middle_doc_recall
    description: "Recall content from a middle document (moderate eviction risk)"
    document_ids:
      - doc_ancient_rome
      - doc_machine_learning
      - doc_world_war_ii
      - doc_solar_system
      - doc_quantum_mechanics
    question: "What was Document 3 about? Give a brief summary of Document 3 only — do not include information from any other document. Include exactly two specific facts from it."
    target_doc_id: doc_world_war_ii
    key_facts:
      - World War II
      - Hitler
      - "1939"

  # Asks for a specific named fact — hard to guess without the right document.
  - id: specific_fact_retrieval
    description: "Retrieve a specific named fact from an early document"
    document_ids:
      - doc_black_death
      - doc_climate_change
      - doc_solar_system
      - doc_machine_learning
      - doc_human_genome
    question: "Based only on the documents I provided, what is the name of the bacterium responsible for the Black Death?"
    target_doc_id: doc_black_death
    key_facts:
      - Yersinia pestis

  # Simulates a user pasting documents into the same chat without starting a new
  # session. Each turn is a self-contained "Summarize this text" request; the
  # answer should always refer to the document in that specific turn. Only pairs
  # after the first are evaluated — the first has no prior cache to be contaminated by.
  - id: sequential_summarize
    mode: sequential_pairs
    description: "Same-chat independent summarize requests; tests cross-turn KV cache contamination"
    evaluate_from_pair: 1
    pairs:
      - doc_id: doc_ancient_rome
        question: "Summarize the document in this message in two or three sentences. Answer only about this document."
      - doc_id: doc_history_of_the_internet
        question: "Summarize the document in this message in two or three sentences. Answer only about this document."
      - doc_id: doc_black_death
        question: "Summarize the document in this message in two or three sentences. Answer only about this document."
      - doc_id: doc_world_war_ii
        question: "Summarize the document in this message in two or three sentences. Answer only about this document."
